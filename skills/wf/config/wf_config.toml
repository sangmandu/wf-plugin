# wf unified config
#
# Sections:
#   [identity]          — Linear user/team (UUIDs required for Linear API)
#   [rules]             — ticket/PR style rules
#   [repos.<name>]      — per-repo settings. <name> matches state.json data.project_name
#                         (derived from git remote / directory basename).
#
# Never hand-edit [identity] unless you know the values — UUIDs are
# irreplaceable from the skill's perspective.

[identity]
user_name = "Sangmin Jeon"
user_id = "cf503ad3-debf-49c6-8577-aa201b7350f0"
email = "sangmin.jeon@allganize.io"
team_name = "Local Executable Agent"
team_id = "705de759-077d-47eb-9cce-16f8617afe52"

[rules]
mode = "custom"
linear_rules = ""
pr_rules = ""

# ── Repos ──────────────────────────────────────────────────────────────
# ci_checks semantics:
#   missing or []     → CI_SETUP step will run discovery and populate it
#   ["__none__"]      → discovery completed, no CI checks detected (skip next time)
#   ["<name>", ...]   → known CI check contexts (GH Actions check name or
#                       commit-status context like "continuous-integration/jenkins/pr-merge")

[repos.poppy]
default_base_branch = "main"
test_command = "pnpm nx affected -t test"
setup_commands = ["pnpm install"]
worktree_copy_from_main = []
ci_checks = ["ci","e2e","review"]

[repos.mally]
setup_commands = ["mise trust && mise install"]
worktree_copy_from_main = []
ci_checks = ["continuous-integration/jenkins/pr-merge","review"]
